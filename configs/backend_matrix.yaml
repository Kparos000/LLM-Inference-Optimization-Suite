hf_local:
  backend_name: huggingface_local
  endpoint_type: in_process
  requires_server: false
  requires_gpu: false
  supports_streaming: false
  supports_ttft: false
  supports_tpot: true
  supports_batch: false
  supports_concurrency: false
  cost_model: local_compute
  status: ready

hf_inference_provider_api:
