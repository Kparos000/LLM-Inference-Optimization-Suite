sequence_length_buckets:
  input:
    - id: isl_0_512
      min_tokens: 0
      max_tokens_exclusive: 512
    - id: isl_512_1024
      min_tokens: 512
      max_tokens_exclusive: 1024
    - id: isl_1024_2048
      min_tokens: 1024
      max_tokens_exclusive: 2048
    - id: isl_2048_4096
      min_tokens: 2048
      max_tokens_exclusive: 4096
    - id: isl_4096_8192
      min_tokens: 4096
      max_tokens_exclusive: 8192
    - id: isl_8192_plus
      min_tokens: 8192
      max_tokens_exclusive: null
  output:
    - id: osl_0_64
      min_tokens: 0
      max_tokens_exclusive: 64
    - id: osl_64_128
      min_tokens: 64
      max_tokens_exclusive: 128
    - id: osl_128_256
      min_tokens: 128
      max_tokens_exclusive: 256
    - id: osl_256_512
      min_tokens: 256
      max_tokens_exclusive: 512
    - id: osl_512_1024
      min_tokens: 512
      max_tokens_exclusive: 1024
    - id: osl_1024_plus
      min_tokens: 1024
      max_tokens_exclusive: null

traffic_profiles:
  online_low_latency:
    description: Interactive online serving with low queue tolerance.
    default_concurrency: 1
    max_recommended_concurrency: 4
    default_request_arrival_mode: jittered_poisson
    target: minimize_ttft_and_p95_latency
  office_hours_bursty:
    description: Bursty daytime internal traffic with short spikes.
    default_concurrency: 4
    max_recommended_concurrency: 16
    default_request_arrival_mode: bursty_jittered
    target: tolerate_short_spikes_without_tail_latency_collapse
  offline_throughput:
    description: Batch/offline queue where aggregate throughput is primary.
    default_concurrency: 8
    max_recommended_concurrency: 32
    default_request_arrival_mode: closed_loop
    target: maximize_tokens_per_second_under_quality_guard
  custom:
    description: Explicit caller-supplied traffic profile.
    default_concurrency: 1
    max_recommended_concurrency: null
    default_request_arrival_mode: custom
    target: caller_defined
