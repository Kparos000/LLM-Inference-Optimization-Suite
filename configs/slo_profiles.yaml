version: 1
default_profile: default_enterprise

priority_modes:
  balanced:
    retrieval: 1.0
    quality: 1.0
    latency: 1.0
    throughput: 1.0
    resource: 1.0
    api_cost: 1.0
    gpu_cost: 1.0
    retrieval_ablation: 1.0
    compression: 1.0
    agentic_trace: 1.0
  quality_first:
    retrieval: 1.4
    quality: 1.5
    latency: 0.8
    throughput: 0.8
    resource: 0.8
    api_cost: 0.7
    gpu_cost: 0.7
    retrieval_ablation: 1.2
    compression: 0.9
    agentic_trace: 1.0
  latency_first:
    retrieval: 0.9
    quality: 1.0
    latency: 1.5
    throughput: 1.1
    resource: 1.1
    api_cost: 0.7
    gpu_cost: 0.8
    retrieval_ablation: 0.8
    compression: 1.2
    agentic_trace: 0.8
  throughput_first:
    retrieval: 0.8
    quality: 0.9
    latency: 1.1
    throughput: 1.5
    resource: 1.3
    api_cost: 0.7
    gpu_cost: 0.9
    retrieval_ablation: 0.7
    compression: 1.0
    agentic_trace: 0.7
  cost_first:
    retrieval: 0.8
    quality: 1.0
    latency: 0.8
    throughput: 1.0
    resource: 1.1
    api_cost: 1.5
    gpu_cost: 1.5
    retrieval_ablation: 0.7
    compression: 1.2
    agentic_trace: 0.8

profiles:
  default_enterprise:
    description: Enterprise profile backed by the authoritative production SLO targets.
    targets_path: configs/slo_targets.yaml
    enabled_groups:
      - retrieval
      - quality
      - latency
      - throughput
      - resource
      - api_cost
      - gpu_cost
      - retrieval_ablation
      - compression
      - agentic_trace
    disabled_groups: []
    priority_mode: balanced
    vertical_overrides: {}
    group_applicability:
      api_cost:
        backend_types:
          - api
          - provider
      gpu_cost:
        requires_gpu_hourly_price: true
      resource:
        requires_hardware_telemetry: true
    supplemental_targets:
      agentic_trace:
        retrieval_rounds_max: 2
        generation_attempts_max: 2
        repair_attempts_max: 1
        tool_calls_max: 3
        trace_completeness_min: 1.0
