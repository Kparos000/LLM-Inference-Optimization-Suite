name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate config coverage tests
        run: |
          pytest tests/test_config_validation.py

      - name: Validate repo hygiene tests
        run: |
          pytest tests/test_repo_hygiene.py

      - name: Validate CI config audit tests
        run: |
          pytest tests/test_ci_config_audit.py

      - name: Run mypy
        run: |
          mypy src tests

      - name: Run tests
        run: |
          pytest

      - name: Run ruff lint
        run: |
          ruff check .

      - name: Run ruff format check
        run: |
          ruff format --check .

      - name: Run public content audit
        run: |
          python scripts/audit_repo_public_content.py

      - name: Run CLI doctor
        run: |
          inference-bench doctor

      - name: Validate benchmark configuration
        run: |
          inference-bench validate-config
